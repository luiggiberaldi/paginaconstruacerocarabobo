<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="only light" />
  <meta name="supported-color-schemes" content="light" />
  <meta name="description" content="Construacero Carabobo — Sistema de gestión para ferretería" />
  <title>Construacero Carabobo</title>

  <!-- PWA — manifest inyectado por vite-plugin-pwa -->
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Construacero" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Tipografía -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root">
    <!-- Splash screen CSS puro — visible instantáneamente mientras React carga -->
    <div id="splash" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f9ff 0%,#ecfdf5 100%)">
      <div style="display:flex;flex-direction:column;align-items:center;gap:1rem">
        <img src="/logo-dark.png" alt="Construacero" style="height:96px;width:auto;opacity:.9" />
        <div id="splash-spinner" style="width:32px;height:32px;border:3px solid #7dd3fc;border-top-color:#0ea5e9;border-radius:50%;animation:sp .7s linear infinite"></div>
        <div id="chunk-error" style="display:none;text-align:center;margin-top:1rem">
          <p style="font-family:Inter,sans-serif;font-size:14px;color:#64748b;margin-bottom:12px">Nueva versión disponible</p>
          <button onclick="clearAndReload()" style="font-family:Inter,sans-serif;font-size:14px;font-weight:700;padding:10px 24px;background:#0ea5e9;color:#fff;border:none;border-radius:12px;cursor:pointer">Actualizar ahora</button>
        </div>
      </div>
    </div>
    <style>#splash{transition:opacity .2s}@keyframes sp{to{transform:rotate(360deg)}}</style>
  </div>
  <script>
    // Detectar errores de carga de módulos (chunks con hash viejo después de un deploy)
    window.addEventListener('error', function(e) {
      if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
        showChunkError();
      }
    }, true);
    window.__viteChunkError = false;
    window.addEventListener('vite:preloadError', function() { showChunkError(); });
    function showChunkError() {
      if (window.__viteChunkError) return;
      window.__viteChunkError = true;
      var el = document.getElementById('chunk-error');
      var sp = document.getElementById('splash-spinner');
      if (el) el.style.display = 'block';
      if (sp) sp.style.display = 'none';
    }
    function clearAndReload() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      if (window.caches) {
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
        });
      }
      setTimeout(function() { location.reload(true); }, 300);
    }
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
